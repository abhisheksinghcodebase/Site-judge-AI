<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#111124" />
      <stop offset="100%" stop-color="#05050a" />
    </radialGradient>
    <!-- Glow filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background squircle -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.03)" stroke-width="8" />

  <!-- Scale / Audit Icon -->
  <g transform="translate(106, 100)" filter="url(#neonGlow)">
    <!-- Base pillar -->
    <rect x="138" y="220" width="24" height="80" rx="6" fill="url(#glowGrad)" />
    <path d="M110 290 H190 V300 H110 Z" fill="url(#glowGrad)" />
    
    <!-- Central Beam -->
    <line x1="38" y1="120" x2="262" y2="120" stroke="url(#glowGrad)" stroke-width="16" stroke-linecap="round" />
    
    <!-- Left Scale Plate -->
    <line x1="38" y1="120" x2="38" y2="190" stroke="url(#glowGrad)" stroke-width="6" />
    <path d="M6 190 C6 220, 70 220, 70 190 Z" fill="none" stroke="url(#glowGrad)" stroke-width="8" />
    
    <!-- Right Scale Plate (balanced) -->
    <line x1="262" y1="120" x2="262" y2="190" stroke="url(#glowGrad)" stroke-width="6" />
    <path d="M230 190 C230 220, 294 220, 294 190 Z" fill="none" stroke="url(#glowGrad)" stroke-width="8" />

    <!-- Center Audit Lens (representing the AI reviewer) -->
    <circle cx="150" cy="120" r="46" fill="#05050a" stroke="#ffffff" stroke-width="10" />
    <line x1="182" y1="152" x2="215" y2="185" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>
